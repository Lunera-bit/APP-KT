name: Android CI

on:
  push:
    branches: [main, develop, feat/**]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests + Vulnerability Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties for CI
        run: |
          cat > local.properties << EOF
          MAPBOX_ACCESS_TOKEN=dummy
          KEYSTORE_PATH=dummy
          KEYSTORE_PASSWORD=dummy
          KEY_ALIAS=dummy
          KEY_PASSWORD=dummy
          EOF

      - name: Run unit tests
        run: ./gradlew test --no-daemon

      - name: Run OWASP Dependency-Check
        run: ./gradlew dependencyCheckAnalyze --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: |
            app/build/reports/tests/
            build/reports/dependency-check/

  instrumentation-tests:
    name: Instrumentation Tests (API 35)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Create local.properties for CI
        run: |
          cat > local.properties << EOF
          MAPBOX_ACCESS_TOKEN=dummy
          KEYSTORE_PATH=dummy
          KEYSTORE_PASSWORD=dummy
          KEY_ALIAS=dummy
          KEY_PASSWORD=dummy
          EOF

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 35
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -cache-size 512
          script: ./gradlew connectedCheck --no-daemon

      - name: Upload instrumented test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports
          path: app/build/reports/androidTests/
