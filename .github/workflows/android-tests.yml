name: Android CI

on:
  push:
    branches: [main, develop, feat/**]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties for CI
        run: |
          echo "MAPBOX_ACCESS_TOKEN=pk.dummy" > local.properties
          echo "MAPBOX_SECRET_TOKEN=pk.dummy" >> local.properties

      - name: Create dummy google-services.json for CI
        run: |
          echo '{"project_info":{"project_number":"000000000000","project_id":"cyryel-ci","storage_bucket":"cyryel-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"com.CYRYEL.com"}},"oauth_client":[{"client_id":"000000000000-dummy.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"AIzaSyDummyKeyForCI"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/

  regression-tests:
    name: Regression Tests
    runs-on: ubuntu-latest
    needs: [unit-tests]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties for CI
        run: |
          echo "MAPBOX_ACCESS_TOKEN=pk.dummy" > local.properties
          echo "MAPBOX_SECRET_TOKEN=pk.dummy" >> local.properties

      - name: Create dummy google-services.json for CI
        run: |
          echo '{"project_info":{"project_number":"000000000000","project_id":"cyryel-ci","storage_bucket":"cyryel-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"com.CYRYEL.com"}},"oauth_client":[{"client_id":"000000000000-dummy.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"AIzaSyDummyKeyForCI"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json

      - name: Run unit tests (regression)
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload regression test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: regression-test-reports
          path: app/build/reports/tests/

  vulnerability-scan:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties for CI
        run: |
          echo "MAPBOX_ACCESS_TOKEN=pk.dummy" > local.properties
          echo "MAPBOX_SECRET_TOKEN=pk.dummy" >> local.properties

      - name: Create dummy google-services.json for CI
        run: |
          echo '{"project_info":{"project_number":"000000000000","project_id":"cyryel-ci","storage_bucket":"cyryel-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"com.CYRYEL.com"}},"oauth_client":[{"client_id":"000000000000-dummy.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"AIzaSyDummyKeyForCI"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json

      - name: Run OWASP Dependency-Check
        run: ./gradlew dependencyCheckAnalyze --no-daemon
        timeout-minutes: 60
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report
          path: app/build/reports/dependency-check/

  emulator-api33:
    name: Emulator Tests (API 33 - System + Integration + Smoke)
    runs-on: ubuntu-latest
    needs: [unit-tests]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties for CI
        run: |
          echo "MAPBOX_ACCESS_TOKEN=pk.dummy" > local.properties
          echo "MAPBOX_SECRET_TOKEN=pk.dummy" >> local.properties

      - name: Create dummy google-services.json for CI
        run: |
          echo '{"project_info":{"project_number":"000000000000","project_id":"cyryel-ci","storage_bucket":"cyryel-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"com.CYRYEL.com"}},"oauth_client":[{"client_id":"000000000000-dummy.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"AIzaSyDummyKeyForCI"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run all connected tests (API 33)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -cache-size 512
          script: ./gradlew connectedDebugAndroidTest --no-daemon

      - name: Upload emulator test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-test-reports-api33
          path: app/build/reports/androidTests/

  emulator-api30:
    name: Emulator Tests (API 30 - Compatibility)
    runs-on: ubuntu-latest
    needs: [emulator-api33]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties for CI
        run: |
          echo "MAPBOX_ACCESS_TOKEN=pk.dummy" > local.properties
          echo "MAPBOX_SECRET_TOKEN=pk.dummy" >> local.properties

      - name: Create dummy google-services.json for CI
        run: |
          echo '{"project_info":{"project_number":"000000000000","project_id":"cyryel-ci","storage_bucket":"cyryel-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"com.CYRYEL.com"}},"oauth_client":[{"client_id":"000000000000-dummy.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"AIzaSyDummyKeyForCI"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}' > app/google-services.json

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run all connected tests (API 30)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 30
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -cache-size 512
          script: ./gradlew connectedDebugAndroidTest --no-daemon

      - name: Upload compatibility test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: emulator-test-reports-api30
          path: app/build/reports/androidTests/
