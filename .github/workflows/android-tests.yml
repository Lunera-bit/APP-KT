      - name: Create local.properties for CI
        run: |
          echo "MAPBOX_ACCESS_TOKEN=pk.dummy" > local.properties
          echo "MAPBOX_SECRET_TOKEN=pk.dummy" >> local.properties
          echo "KEYSTORE_PATH=dummy" >> local.properties
          echo "KEYSTORE_PASSWORD=dummy" >> local.properties
          echo "KEY_ALIAS=dummy" >> local.properties
          echo "KEY_PASSWORD=dummy" >> local.properties

      - name: Create dummy google-services.json for CI
        run: |
          cat > app/google-services.json << 'EOF'
          {"project_info":{"project_number":"000000000000","project_id":"cyryel-ci","storage_bucket":"cyryel-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"com.CYRYEL.com"}},"oauth_client":[{"client_id":"000000000000-dummy.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"AIzaSyDummyKeyForCI"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}
          EOF

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run integration tests (API 33)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -cache-size 512
          script: ./gradlew connectedDebugAndroidTest -Pandroid.testInstrumentationRunnerArguments.package=com.CYRYEL.com.integration --no-daemon

      - name: Upload integration test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports
          path: app/build/reports/androidTests/

  compatibility-tests:
    name: Compatibility (API ${{ matrix.api-level }})
    runs-on: ubuntu-latest
    needs: [unit-tests]
    strategy:
      fail-fast: false
      matrix:
        api-level: [26, 28, 30, 33]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties for CI
        run: |
          echo "MAPBOX_ACCESS_TOKEN=pk.dummy" > local.properties
          echo "MAPBOX_SECRET_TOKEN=pk.dummy" >> local.properties
          echo "KEYSTORE_PATH=dummy" >> local.properties
          echo "KEYSTORE_PASSWORD=dummy" >> local.properties
          echo "KEY_ALIAS=dummy" >> local.properties
          echo "KEY_PASSWORD=dummy" >> local.properties

      - name: Create dummy google-services.json for CI
        run: |
          cat > app/google-services.json << 'EOF'
          {"project_info":{"project_number":"000000000000","project_id":"cyryel-ci","storage_bucket":"cyryel-ci.appspot.com"},"client":[{"client_info":{"mobilesdk_app_id":"1:000000000000:android:0000000000000000","android_client_info":{"package_name":"com.CYRYEL.com"}},"oauth_client":[{"client_id":"000000000000-dummy.apps.googleusercontent.com","client_type":3}],"api_key":[{"current_key":"AIzaSyDummyKeyForCI"}],"services":{"appinvite_service":{"other_platform_oauth_client":[]}}}],"configuration_version":"1"}
          EOF

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run UI tests on API ${{ matrix.api-level }}
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ matrix.api-level }}
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -cache-size 512
          script: ./gradlew connectedDebugAndroidTest --no-daemon

      - name: Upload compatibility reports (API ${{ matrix.api-level }})
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: compatibility-test-reports-api${{ matrix.api-level }}
          path: app/build/reports/androidTests/

  instrumentation-tests:
    name: Instrumentation Tests (API 27 + 35)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
