name: Android CI

on:
  push:
    branches: [main, develop, feat/**]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties for CI
        run: |
          echo "MAPBOX_ACCESS_TOKEN=pk.dummy" > local.properties
          echo "MAPBOX_SECRET_TOKEN=pk.dummy" >> local.properties
          echo "KEYSTORE_PATH=dummy" >> local.properties
          echo "KEYSTORE_PASSWORD=dummy" >> local.properties
          echo "KEY_ALIAS=dummy" >> local.properties
          echo "KEY_PASSWORD=dummy" >> local.properties

      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: unit-test-reports
          path: app/build/reports/tests/

  vulnerability-scan:
    name: OWASP Dependency-Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties for CI
        run: |
          echo "MAPBOX_ACCESS_TOKEN=pk.dummy" > local.properties
          echo "MAPBOX_SECRET_TOKEN=pk.dummy" >> local.properties
          echo "KEYSTORE_PATH=dummy" >> local.properties
          echo "KEYSTORE_PASSWORD=dummy" >> local.properties
          echo "KEY_ALIAS=dummy" >> local.properties
          echo "KEY_PASSWORD=dummy" >> local.properties

      - name: Run OWASP Dependency-Check
        run: ./gradlew dependencyCheckAnalyze --no-daemon
        timeout-minutes: 30
        env:
          NVD_API_KEY: ${{ secrets.NVD_API_KEY }}

      - name: Upload vulnerability report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: vulnerability-report
          path: app/build/reports/dependency-check/

  instrumentation-tests:
    name: Instrumentation Tests (API 27 + 35)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Create local.properties for CI
        run: |
          echo "MAPBOX_ACCESS_TOKEN=pk.dummy" > local.properties
          echo "MAPBOX_SECRET_TOKEN=pk.dummy" >> local.properties
          echo "KEYSTORE_PATH=dummy" >> local.properties
          echo "KEYSTORE_PASSWORD=dummy" >> local.properties
          echo "KEY_ALIAS=dummy" >> local.properties
          echo "KEY_PASSWORD=dummy" >> local.properties

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run instrumented tests (API 27)
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 27
          target: google_apis
          arch: x86_64
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -cache-size 512
          script: ./gradlew connectedDebugAndroidTest --tests "com.CYRYEL.com.*" --no-daemon

      - name: Upload API 27 reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: instrumented-test-reports-api27
          path: app/build/reports/androidTests/
